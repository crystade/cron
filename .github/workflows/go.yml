name: TinyGo WASM Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install TinyGo
        run: |
          wget https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo_0.41.1_amd64.deb
          sudo dpkg -i tinygo_0.41.1_amd64.deb

          tinygo version

      - name: Build WASM
        run: |
          mkdir -p ./dist
          tinygo build -target wasm -o ./dist/cron.wasm ./cmd/wasm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/cron.wasm
